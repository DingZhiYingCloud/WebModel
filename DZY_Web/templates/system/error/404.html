{% load static %}<!doctype html>
<html lang="zh-cn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="{% static site_favicon_static %}">
  <title>404 - 页面走丢啦 | {{ site_name }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
      overflow: hidden;
    }

    /* ===== 浮动装饰 ===== */
    .float-deco {
      position: fixed;
      pointer-events: none;
      opacity: 0.15;
      font-size: 2rem;
      animation: floatUp 8s ease-in-out infinite;
    }
    .float-deco:nth-child(1) { left: 5%; top: 20%; animation-delay: 0s; }
    .float-deco:nth-child(2) { left: 15%; top: 70%; animation-delay: 1.5s; }
    .float-deco:nth-child(3) { right: 10%; top: 15%; animation-delay: 3s; }
    .float-deco:nth-child(4) { right: 20%; top: 75%; animation-delay: 4.5s; }
    .float-deco:nth-child(5) { left: 40%; top: 5%; animation-delay: 2s; }
    .float-deco:nth-child(6) { right: 35%; bottom: 10%; animation-delay: 5s; }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }

    /* ===== 主容器 ===== */
    .container {
      text-align: center;
      padding: 2rem;
      position: relative;
      z-index: 1;
    }

    /* ===== 插图区域 ===== */
    .illustration {
      margin-bottom: 2rem;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    /* ===== 大标题 404 ===== */
    .error-code {
      font-size: 6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24, #f0932b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 0.5rem;
      text-shadow: none;
      letter-spacing: 0.05em;
    }

    /* ===== 副标题 ===== */
    .error-title {
      font-size: 1.5rem;
      color: #5f27cd;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* ===== 描述文字 ===== */
    .error-desc {
      font-size: 1rem;
      color: #777;
      line-height: 1.8;
      margin-bottom: 2rem;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ===== 返回按钮 ===== */
    .btn-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 32px;
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
      color: #fff;
      text-decoration: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
    }
    .btn-home:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
    }
    .btn-home:active {
      transform: translateY(0);
    }

    /* ===== 底部小字 ===== */
    .footer-text {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #aaa;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      .error-code { font-size: 4rem; }
      .error-title { font-size: 1.2rem; }
      .error-desc { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- 浮动装饰 -->
  <div class="float-deco">🌸</div>
  <div class="float-deco">✨</div>
  <div class="float-deco">💫</div>
  <div class="float-deco">🎀</div>
  <div class="float-deco">🌟</div>
  <div class="float-deco">🦋</div>

  <div class="container">

    <!-- 可爱猫咪迷路插图 -->
    <div class="illustration">
      <svg width="220" height="200" viewBox="0 0 220 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 猫咪身体 -->
        <ellipse cx="110" cy="135" rx="55" ry="45" fill="#FFD93D"/>
        <!-- 猫咪头部 -->
        <circle cx="110" cy="80" r="40" fill="#FFD93D"/>
        <!-- 左耳 -->
        <polygon points="78,50 65,15 95,42" fill="#FFD93D"/>
        <polygon points="80,47 70,22 92,43" fill="#FFB7B7"/>
        <!-- 右耳 -->
        <polygon points="142,50 155,15 125,42" fill="#FFD93D"/>
        <polygon points="140,47 150,22 128,43" fill="#FFB7B7"/>
        <!-- 眼睛（可爱大眼） -->
        <ellipse cx="95" cy="78" rx="10" ry="12" fill="#333"/>
        <ellipse cx="125" cy="78" rx="10" ry="12" fill="#333"/>
        <!-- 眼睛高光 -->
        <circle cx="99" cy="74" r="4" fill="#fff"/>
        <circle cx="129" cy="74" r="4" fill="#fff"/>
        <circle cx="93" cy="81" r="2" fill="#fff"/>
        <circle cx="123" cy="81" r="2" fill="#fff"/>
        <!-- 鼻子 -->
        <ellipse cx="110" cy="90" rx="4" ry="3" fill="#FFB7B7"/>
        <!-- 嘴巴（委屈） -->
        <path d="M102 95 Q110 100 118 95" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <!-- 腮红 -->
        <ellipse cx="82" cy="90" rx="8" ry="5" fill="#FFB7B7" opacity="0.5"/>
        <ellipse cx="138" cy="90" rx="8" ry="5" fill="#FFB7B7" opacity="0.5"/>
        <!-- 胡须 -->
        <line x1="70" y1="85" x2="85" y2="88" stroke="#333" stroke-width="1" opacity="0.4"/>
        <line x1="68" y1="92" x2="84" y2="92" stroke="#333" stroke-width="1" opacity="0.4"/>
        <line x1="135" y1="88" x2="150" y2="85" stroke="#333" stroke-width="1" opacity="0.4"/>
        <line x1="136" y1="92" x2="152" y2="92" stroke="#333" stroke-width="1" opacity="0.4"/>
        <!-- 尾巴 -->
        <path d="M160 135 Q175 110 165 90" stroke="#FFD93D" stroke-width="8" fill="none" stroke-linecap="round"/>
        <!-- 小爪子 -->
        <ellipse cx="85" cy="170" rx="12" ry="8" fill="#FFD93D"/>
        <ellipse cx="135" cy="170" rx="12" ry="8" fill="#FFD93D"/>
        <!-- 问号装饰 -->
        <text x="170" y="55" font-size="28" font-weight="bold" fill="#ff6b6b" opacity="0.8">?</text>
        <text x="30" y="65" font-size="22" font-weight="bold" fill="#ff6b6b" opacity="0.6">?</text>
        <!-- 泪珠（猫咪迷路了） -->
        <path d="M88 92 Q86 98 88 100 Q90 98 88 92" fill="#87CEEB" opacity="0.7"/>
      </svg>
    </div>

    <div class="error-code">404</div>
    <div class="error-title">哎呀，页面走丢啦 ~</div>
    <div class="error-desc">
      你想找的页面好像迷路了，连小猫咪都找不到它呢 🐱<br>
      检查一下网址是否正确，或者回到首页重新开始吧~
    </div>

    <a href="{% url 'site_index' %}" class="btn-home">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      回到首页
    </a>

    <div class="footer-text">
      {{ site_name }} &copy; 2026
    </div>
  </div>

</body>
</html>
