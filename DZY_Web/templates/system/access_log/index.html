<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访问日志监控系统</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .login-form input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .login-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-form button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-form button:hover {
            transform: translateY(-2px);
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 20px;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }

        .dashboard-header {
            background: white;
            padding: 25px 30px;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            color: #333;
            font-size: 28px;
        }

        .logout-btn {
            padding: 10px 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            color: #666;
            margin-top: 8px;
            font-size: 14px;
        }

        .stat-card.green .stat-value {
            color: #27ae60;
        }

        .stat-card.blue .stat-value {
            color: #3498db;
        }

        .stat-card.orange .stat-value {
            color: #f39c12;
        }

        .stat-card.red .stat-value {
            color: #e74c3c;
        }

        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .chart-card h3 {
            color: #333;
            margin-bottom: 20px;
            font-size: 18px;
        }

        .chart-card canvas {
            height: 250px !important;
            width: 100% !important;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters select,
        .filters input {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .filters button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .logs-table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .logs-table {
            width: 100%;
            border-collapse: collapse;
        }

        .logs-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        .logs-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
        }

        .logs-table tr:hover {
            background: #f8f9fa;
        }

        .status-2xx {
            color: #27ae60;
            font-weight: 600;
        }

        .status-3xx {
            color: #3498db;
            font-weight: 600;
        }

        .status-4xx {
            color: #f39c12;
            font-weight: 600;
        }

        .status-5xx {
            color: #e74c3c;
            font-weight: 600;
        }

        .method-get {
            color: #27ae60;
        }

        .method-post {
            color: #3498db;
        }

        .method-delete {
            color: #e74c3c;
        }

        .method-put {
            color: #f39c12;
        }

        .pagination {
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .pagination button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .pagination button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="loginPage" class="login-container">
        <h1>🔐 访问日志系统</h1>
        <div id="loginError" class="error hidden">密码错误，请重试</div>
        <form class="login-form" onsubmit="handleLogin(event)">
            <input type="password" id="passwordInput" placeholder="请输入访问密码" autocomplete="off">
            <button type="submit">登录</button>
        </form>
    </div>

    <div id="dashboardPage" class="dashboard hidden">
        <div class="dashboard-header">
            <h1>📊 访问日志监控</h1>
            <button class="logout-btn" onclick="handleLogout()">退出登录</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="totalRequests">0</div>
                <div class="stat-label">总请求数</div>
            </div>
            <div class="stat-card green">
                <div class="stat-value" id="uniqueIps">0</div>
                <div class="stat-label">独立IP</div>
            </div>
            <div class="stat-card blue">
                <div class="stat-value" id="avgDuration">0ms</div>
                <div class="stat-label">平均响应时间</div>
            </div>
            <div class="stat-card orange">
                <div class="stat-value" id="status2xx">0</div>
                <div class="stat-label">2xx 成功</div>
            </div>
            <div class="stat-card red">
                <div class="stat-value" id="status4xx">0</div>
                <div class="stat-label">4xx 错误</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="status5xx">0</div>
                <div class="stat-label">5xx 错误</div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-card">
                <h3>📈 请求趋势（按小时）</h3>
                <canvas id="hourChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>📊 状态码分布</h3>
                <canvas id="statusChart"></canvas>
            </div>
        </div>

        <div class="filters">
            <select id="filterDomain">
                <option value="">全部域名</option>
            </select>
            <select id="filterStatus">
                <option value="">全部状态</option>
                <option value="200">200 OK</option>
                <option value="404">404 Not Found</option>
                <option value="500">500 Error</option>
            </select>
            <select id="filterMethod">
                <option value="">全部方法</option>
                <option value="GET">GET</option>
                <option value="POST">POST</option>
            </select>
            <input type="date" id="filterDate" placeholder="日期">
            <input type="text" id="filterIp" placeholder="IP地址 如：127.0.0.1">
            <button onclick="applyFilters()">🔍 筛选</button>
            <button onclick="refreshData()">🔄 刷新</button>
        </div>

        <div class="logs-table-container">
            <table class="logs-table">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>域名</th>
                        <th>IP</th>
                        <th>方法</th>
                        <th>路径</th>
                        <th>状态</th>
                        <th>耗时</th>
                        <th>User-Agent</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                </tbody>
            </table>
            <div class="pagination" id="pagination">
            </div>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'access_log_auth';
        let currentPage = 1;
        const pageSize = 50;
        let allLogs = [];
        let filteredLogs = [];

        function isAuthenticated() {
            return sessionStorage.getItem(STORAGE_KEY) === 'true';
        }

        function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;

            fetch(window.location.pathname, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'password=' + encodeURIComponent(password)
            }).then(res => res.json()).then(data => {
                if (data.success) {
                    sessionStorage.setItem(STORAGE_KEY, 'true');
                    showDashboard();
                    loadData();
                } else {
                    document.getElementById('loginError').classList.remove('hidden');
                }
            });
        }

        function handleLogout() {
            sessionStorage.removeItem(STORAGE_KEY);
            document.getElementById('dashboardPage').classList.add('hidden');
            document.getElementById('loginPage').classList.remove('hidden');
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').classList.add('hidden');
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
        }

        async function loadData() {
            const res = await fetch(window.location.pathname + '?api=1');
            const data = await res.json();
            allLogs = data.logs;
            filteredLogs = [...allLogs];

            updateStats(data.stats);
            updateCharts(data.stats);
            updateDomainFilter();
            renderLogs();
        }

        function updateStats(stats) {
            document.getElementById('totalRequests').textContent = stats.total_requests;
            document.getElementById('uniqueIps').textContent = stats.unique_ip_count;
            document.getElementById('avgDuration').textContent = Math.round(stats.avg_duration) + 'ms';
            document.getElementById('status2xx').textContent = stats.status_2xx;
            document.getElementById('status4xx').textContent = stats.status_4xx;
            document.getElementById('status5xx').textContent = stats.status_5xx;
        }

        let hourChartInstance = null;
        let statusChartInstance = null;

        function updateCharts(stats) {
            const hourLabels = Object.keys(stats.by_hour).sort();
            const hourData = hourLabels.map(h => stats.by_hour[h]);

            if (hourChartInstance) hourChartInstance.destroy();
            hourChartInstance = new Chart(document.getElementById('hourChart'), {
                type: 'line',
                data: {
                    labels: hourLabels.map(h => h + ':00'),
                    datasets: [{
                        label: '请求数',
                        data: hourData,
                        borderColor: '#667eea',
                        backgroundColor: 'rgba(102, 126, 234, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            const statusData = [
                stats.status_2xx,
                stats.status_3xx,
                stats.status_4xx,
                stats.status_5xx
            ];

            if (statusChartInstance) statusChartInstance.destroy();
            statusChartInstance = new Chart(document.getElementById('statusChart'), {
                type: 'doughnut',
                data: {
                    labels: ['2xx', '3xx', '4xx', '5xx'],
                    datasets: [{
                        data: statusData,
                        backgroundColor: ['#27ae60', '#3498db', '#f39c12', '#e74c3c']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateDomainFilter() {
            const domains = [...new Set(allLogs.map(l => l.domain))].filter(d => d);
            const select = document.getElementById('filterDomain');
            domains.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d;
                opt.textContent = d;
                select.appendChild(opt);
            });
        }

        function applyFilters() {
            const domain = document.getElementById('filterDomain').value;
            const status = document.getElementById('filterStatus').value;
            const method = document.getElementById('filterMethod').value;
            const date = document.getElementById('filterDate').value;
            const ip = document.getElementById('filterIp').value.trim();

            filteredLogs = allLogs.filter(l => {
                if (domain && l.domain !== domain) return false;
                if (status && String(l.status_code) !== status) return false;
                if (method && l.method !== method) return false;
                if (date && !l.timestamp.startsWith(date)) return false;
                if (ip && !l.ip.includes(ip)) return false;
                return true;
            });

            currentPage = 1;
            renderLogs();
        }

        function refreshData() {
            loadData();
        }

        function renderLogs() {
            const tbody = document.getElementById('logsTableBody');
            const start = (currentPage - 1) * pageSize;
            const pageLogs = filteredLogs.slice(start, start + pageSize);

            tbody.innerHTML = pageLogs.map(l => `
                <tr>
                    <td>${l.timestamp}</td>
                    <td>${l.domain || '-'}</td>
                    <td>${l.ip}</td>
                    <td class="method-${l.method.toLowerCase()}">${l.method}</td>
                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis;" title="${l.path}">${l.path}</td>
                    <td class="status-${Math.floor(l.status_code / 100)}xx">${l.status_code}</td>
                    <td>${Math.round(l.duration * 1000)}ms</td>
                    <td style="max-width: 200px; overflow: hidden; text-overflow: ellipsis; font-size: 12px; color: #666;" title="${l.user_agent}">${l.user_agent || '-'}</td>
                </tr>
            `).join('');

            renderPagination();
        }

        function renderPagination() {
            const totalPages = Math.ceil(filteredLogs.length / pageSize);
            const pagination = document.getElementById('pagination');
            let html = '';

            for (let i = 1; i <= Math.min(totalPages, 10); i++) {
                html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }

            pagination.innerHTML = html;
        }

        function goToPage(page) {
            currentPage = page;
            renderLogs();
        }

        if (isAuthenticated()) {
            showDashboard();
            loadData();
        }
    </script>
</body>

</html>
